<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Course Page</title>
  <link href="../css/style.css" rel="stylesheet">
    <link href="../css/assessments.css" rel="stylesheet">
    <link href="../css/modal.css" rel="stylesheet">
  </head>
  <body>

    <nav class="navbar">
      <div class="nav-brand">
      <a href="student-dashboard.html">SmartCourse</a>
      </div>
      <ul class="nav-menu" id="navMenu">
        <li><a href="student-dashboard.html">Dashboard</a></li>
        <li><a href="courses.html">Courses</a></li>
        <li><a href="assessments.html" class="active">Assessments</a></li>
        <li><a href="progressbar.html">Statistics</a></li>
        <li><a href="../login.html?logout=true">Logout</a></li>
      </ul>
      <div class="user-profile">
        <span>student@test.com</span>
      </div>
    </nav>


    <div class="container mt-2">

      <div class="col-12">
        <h1>Assessments</h1>

        <div class="card" id="assessmentDetails">
          <!-- Assessments will be loaded here by JavaScript -->

        </div>
      </div>
    </div>

    <!-- Submission Modal -->
    <div id="submissionModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>New Submission</h2>
          <span class="close" onclick="closeSubmissionModal()">&times;</span>
        </div>
        <div class="modal-body">
          <form id="submissionForm">
            <div class="form-group">
              <label for="submissionContent">Submission Content:</label>
              <textarea id="submissionContent" placeholder="Enter your submission details..." rows="6" maxlength=""></textarea>
            </div>
            <div class="form-group">
              <label for="submissionFile">Attach File (optional):</label>
              <input type="file" id="submissionFile" />
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn" onclick="closeSubmissionModal()">Cancel</button>
          <button class="btn" onclick="submitAssessment()">Submit</button>
        </div>
      </div>
    </div>

    <script src="../js/mock-data.js"></script>
    <script src="../js/assessments.js"></script>
  </body>
</html>
