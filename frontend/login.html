<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Course Companion</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-container" style="max-width: 400px; margin: 100px auto;">
    <div class="card">
        <h1 style="text-align: center;">Smart Course Companion</h1>
        <p style="text-align: center; color: var(--text-light); margin-bottom: 30px;">Sign in to continue</p>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email" value="instructor@test.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" value="password" required>
            </div>

            <div class="form-group">
                <button type="submit" class="btn" style="width: 100%;">Login</button>
            </div>

            <p style="text-align: center;">
                <a href="pages/forgot.html">Forgot password?</a>
            </p>

            <p style="text-align:center;">
                <a href="pages/register.html">Create an account</a>
            </p>

            <hr>

            <p style="text-align: center; color: var(--text-light); font-size: 14px;">
                Demo credentials:<br>
                Instructor: instructor@test.com / any password<br>
                Student: student@test.com / any password
            </p>
        </form>
    </div>
</div>

<script>
    function handleLogin(e) {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role');

        // Simple demo login - just redirect based on role or email
        if (email.includes('instructor') || role === 'instructor') {
            window.location.href = 'pages/instructor-dashboard.html';
        } else {
            window.location.href = 'pages/student-dashboard.html';
        }
    }
</script>
</body>
</html>
