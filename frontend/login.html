<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Course Companion</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-container" style="max-width: 400px; margin: 100px auto;">
    <!-- Inline error container -->
    <div id="loginError" class="error-message" style="color: #dc3545; margin: 10px 0; display: none; font-size: 14px; padding: 8px 12px; background: #ffe6e6; border-radius: 4px; border: 1px solid #f5c6cb;"></div>

    <div class="card">
        <h1 style="text-align: center;">Smart Course Companion</h1>
        <p style="text-align: center; color: var(--text-light); margin-bottom: 30px;">Sign in to continue</p>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email" value="instructor@test.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" value="instructor-password" required>
            </div>

            <div class="form-group">
                <button type="submit" class="btn" style="width: 100%;">Login</button>
            </div>

            <p style="text-align: center;">
                <a href="pages/forgot.html">Forgot password?</a>
            </p>

            <p style="text-align:center;">
                <a href="pages/register.html">Create an account</a>
            </p>

            <hr>

            <p style="text-align: center; color: var(--text-light); font-size: 14px;">
                Demo credentials:<br>
                Instructor: instructor@test.com / instructor-password<br>
                Student: student@test.com / password
            </p>
        </form>
    </div>
</div>

<script>
    const API_BASE = 'http://localhost:3000/api';

    // Show error inline instead of alert
    function showError(message) {
        const errorEl = document.getElementById('loginError');
        if (errorEl) {
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            // Auto-hide after 5 seconds
            setTimeout(() => { errorEl.style.display = 'none'; }, 5000);
        }
    }

    async function handleLogin(e) {
        e.preventDefault();

        // Clear any previous error
        const errorEl = document.getElementById('loginError');
        if (errorEl) {
            errorEl.style.display = 'none';
            errorEl.textContent = '';
        }

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch(`${API_BASE}/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok && data.success) {
                // Store token
                localStorage.setItem('token', data.token);

                // Redirect based on role
                if (data.user.role === 'instructor') {
                    window.location.href = 'pages/instructor-dashboard.html';
                } else {
                    window.location.href = 'pages/student-dashboard.html';
                }
            } else {
                // Show error inline instead of alert
                showError(data.error || 'Invalid credentials');
            }
        } catch (error) {
            console.error('Login error:', error);
            showError('Login failed. Please make sure the backend server is running.');
        }
    }
</script>
</body>
</html>
